<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InfraGuard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #1e2023;
        color: #ffffff;
      }
      /* Custom Scrollbar Rules */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #1e2023;
      }
      ::-webkit-scrollbar-thumb {
        background: #47484c;
        border-radius: 2px;
        transition: background 200ms ease;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #58a6ff;
      }
      
      /* Status Pulse Animation */
      @keyframes statusPulse {
        0% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.5); }
        70% { box-shadow: 0 0 0 6px rgba(63, 185, 80, 0); }
        100% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); }
      }
      .status-pulse-green {
        animation: statusPulse 2s infinite;
      }

      /* Red status dot no-pulse */
      .status-dot-red {
        background-color: #f85149;
        box-shadow: none;
      }

      /* Shimmer Animation for loading skeleton */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton-shimmer {
        background: linear-gradient(90deg, #2a2b2f 25%, #35363a 50%, #2a2b2f 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      /* Sidebar navigation items */
      .sidebar-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        margin: 4px 12px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        color: #a0a0a8;
        background: transparent;
        border-left: 3px solid transparent;
        transition: all 200ms ease;
      }
      .sidebar-link:hover {
        color: #ffffff;
        background: #2a2b2f;
      }
      .sidebar-link.active {
        color: #ffffff !important;
        background: #2a2b2f !important;
        border-left-color: #58a6ff !important;
      }

      /* Logout Button */
      .logout-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 36px;
        border: 1px solid #f85149;
        background: transparent;
        color: #f85149;
        border-radius: 20px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        width: 100%;
        transition: all 200ms ease;
      }
      .logout-btn:hover {
        background: #f85149;
        color: #ffffff;
      }

      /* General buttons & inputs */
      .btn-accent {
        background: #58a6ff;
        color: #ffffff;
        border: none;
        border-radius: 20px;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: all 200ms ease;
      }
      .btn-accent:hover {
        background: #408ee0;
      }

      .btn-outlined-accent {
        background: transparent;
        color: #58a6ff;
        border: 1px solid #58a6ff;
        border-radius: 20px;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: all 200ms ease;
      }
      .btn-outlined-accent:hover {
        background: rgba(88, 166, 255, 0.1);
      }

      .btn-danger-block {
        background: #f85149;
        color: #ffffff;
        border: none;
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 150ms ease;
      }
      .btn-danger-block:hover {
        background: #df433b;
      }

      .btn-warning-kill {
        background: #f0883e;
        color: #ffffff;
        border: none;
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 150ms ease;
      }
      .btn-warning-kill:hover {
        background: #d87530;
      }

      .btn-outlined-danger {
        background: transparent;
        color: #f85149;
        border: 1px solid #f85149;
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 200ms ease;
      }
      .btn-outlined-danger:hover {
        background: #f85149;
        color: #ffffff;
      }

      /* Card Styling with smooth borders and hover transition */
      .info-card {
        background: #2a2b2f;
        border: 1px solid #47484c;
        border-radius: 12px;
        padding: 20px;
        transition: border-color 200ms ease, box-shadow 200ms ease;
      }
      .info-card:hover {
        border-color: #58a6ff;
      }
    
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
